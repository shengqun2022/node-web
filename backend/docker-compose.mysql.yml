services:
  # Vue 静态资源 + 反代 /api、/uploads、/docs 到 api 容器（见 ../fronted/Dockerfile）
  web:
    build:
      context: ../fronted
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-app}@mysql:3306/${MYSQL_DATABASE:-app}
    # 不需要对公网暴露 3000，统一走 web 容器的 80 端口
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && node dist/index.js"

volumes:
  mysql_data:

